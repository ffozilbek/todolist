<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Todo list</title>
</head>

<body>
    <div class="container">
        <div class="todo">
            <h2 class="text-center mb-3">To Do list</h2>
            <div class="input-group mb-3">
                <input type="text" class="form-control js-input" placeholder="add to do" aria-label="add to do"
                    aria-describedby="button-addon2">
                <button class="btn btn-outline-secondary js-button" type="button" id="button-addon2">Add</button>
            </div>
            <ul class="list-group js-list-group">
            </ul>
        </div>
    </div>
    <script src="./js/script.js"></script>
</body>

</html>
